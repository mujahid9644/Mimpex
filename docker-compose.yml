services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mimpex
      POSTGRES_USER: mimpex
      POSTGRES_PASSWORD: mimpex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: mimpex
      POSTGRES_USER: mimpex
      POSTGRES_PASSWORD: mimpex
      USE_INMEMORY_CHANNEL_LAYER: "false"
      REDIS_HOST: redis
    depends_on:
      - db
      - redis
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_matrix &&
             daphne -b 0.0.0.0 -p 8000 mimpex_api.asgi:application"

volumes:
  pgdata:
